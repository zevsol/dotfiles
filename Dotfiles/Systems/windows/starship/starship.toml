# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# ====================================
# 右侧提示配置（关键！） powershell 不支持
# ====================================

# right_format = """
# $cmd_duration\
# $env_var\
# $env_var.all_proxy\
# $time\
# """


# ====================================
# 全局设置
# ====================================
# 提示行之间不插入空行
add_newline = false

# 延长目录扫描超时时间（单位：毫秒）
scan_timeout = 1000

# ====================================
# 左侧提示配置
# ====================================

[hostname]
ssh_only = true
ssh_symbol = "🌐 "
style = "bold #56b6c2"
format = "on [$ssh_symbol$hostname]($style) "
disabled = false

# 替换 '❯' 符号为 '➜'
[character]
success_symbol = '[➜](bold green)'

# 禁用 package 模块
[package]
disabled = true

# 目录设置
[directory]
truncation_length = 0
truncate_to_repo = false
read_only = " 🔒"
read_only_style = "bold #e06c75"

# Git 分支
[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '

# Git 状态
[git_status]
format = '[$all_status$ahead_behind]($style) '
style = "bold #e5c07b"
conflicted = "⚔️ "
ahead = "🏎️ 💨 ×${count}"
behind = "🐢 ×${count}"
diverged = "🔱 🏎️ 💨 ×${ahead_count} 🐢 ×${behind_count}"
untracked = "❓ ×${count}"
stashed = "📦 "
modified = "📝 ×${count}"
staged = "➕ ×${count}"
renamed = "📛 ×${count}"
deleted = "🗑️ ×${count}"

# Java
[java]
format = '[$symbol($version )]($style)'

# Rust
[rust]
format = '[$symbol($version )]($style)'

# Python
[python]
format = '[$symbol$pyenv_prefix($version )(\($virtualenv\) )]($style)'

# Node.js
[nodejs]
format = '[$symbol($version )]($style)'

# Lua
[lua]
format = '[$symbol($version )]($style)'

# Go
[golang]
format = '[$symbol($version )]($style)'

# C/C++
[c]
format = '[$symbol($version(-$name) )]($style)'

# ====================================
# 右侧信息模块
# ====================================

# 代理设置显示
[env_var.all_proxy]
variable = "all_proxy"
format = "[$env_value]($style) "
default = ''
style = "bold #82AAFF"

# 命令执行耗时（超过2秒才显示）
[cmd_duration]
min_time = 2000
format = "⏱️ [$duration]($style) "
style = "yellow"